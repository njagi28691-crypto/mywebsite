<!DOCTYPE html>
<html>
<head>
    <title>New York - The Big Apple</title>
    <style>
        body {
            /* Full page background */
            background-image: url("nyc.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            /* Ensuring image clarity */
            image-rendering: high-quality;
            
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Landscape images for top and bottom */
        .landscape-img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
            border-bottom: 5px solid #f1c40f; /* Taxi yellow accent */
        }

        .content {
            background-color: rgba(255, 255, 255, 0.9); /* Bright, clear white box */
            color: #333;
            padding: 40px;
            max-width: 700px;
            margin: 40px 20px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { 
            color: #000; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            border-bottom: 2px solid #f1c40f;
            display: inline-block;
            padding-bottom: 10px;
        }

        .details {
            text-align: left;
            margin-top: 20px;
            line-height: 1.8;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 35px;
            background-color: #000;
            color: #f1c40f;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background-color: #f1c40f;
            color: #000;
        }
    </style>
</head>
<div>

    <img src="nyc_skyline . jpg.jpg" alt="New York Skyline" class="landscape-img">

    <div class="content">
        <h1>New York City</h1>
        <p>The city so nice, they named it twice. From the lights of Times Square to the greenery of Central Park.</p>

        <div class="details">
            <strong>Top Attractions:</strong>
            <ul>
                <li>The Empire State Building</li>
                <li>Statue of Liberty & Ellis Island</li>
                <li>Broadway Shows and Theater District</li>
            </ul>
          </div>
            <br>
        <a href="apply.html" class="back-btn">Apply Now</a>
            <br>
            <a href="index2.html" class="back-btn">RETURN TO GUIDE</a>
        </div>
        
    </div>

    

</body>
</html>
