<!DOCTYPE html>
<html>
<head>
    <title>Tokyo - Neon Nights</title>
    <style>
        body {
            
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url("japan bg).jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Landscape images for top and bottom */
        .landscape-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
            border-bottom: 2px solid #00ffcc;
            border-top: 2px solid #00ffcc;
        }

        .content {
            padding: 50px 20px;
            max-width: 800px;
            margin: 0 auto;
            background-color: rgba(0, 0, 0, 0.6); /* Semi-transparent box for text */
            border-radius: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        h1 { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
        
        ul { list-style: none; padding: 0; line-height: 2; }
        li::before { content: "🏮 "; }

        .back-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background-color: #00ffcc;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover { background-color: #ff00ff; color: white; }
    </style>
</head>
<body>

    <img src="tokyo2.jpg" alt="Tokyo Skyline" class="landscape-img">

    <div class="content">
        <h1>Tokyo, Japan</h1>
        <p>A dazzling mix of futuristic skyscrapers and historic temples. Tokyo is a city that truly never sleeps.</p>

        <hr style="border: 0; height: 1px; background: #00ffcc;">

        <h3>Must-See Activities:</h3>
        <ul>
            <li>Crossing the famous Shibuya Scramble</li>
            <li>Exploring the neon lights of Akihabara</li>
            <li>Visiting the historic Senso-ji Temple</li>
        </ul>
        <a href="apply.html" class="back-btn">Apply Now</a>

          <br/>
        <a href="index2.html" class="back-btn">Return to Main Guide</a>
    </div>

    <img src="japan.jpg" alt="Tokyo Night Street" class="landscape-img">

</body>
</html>
